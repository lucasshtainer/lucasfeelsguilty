services:
  - type: web
    name: lucasfeelsguilty
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATA_DIR
        value: /var/data
    disk:
      name: lfg-data
      mountPath: /var/data
      sizeGB: 1
